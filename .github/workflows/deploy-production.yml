name: Deploy to Netlify (Production)

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: sbt/setup-sbt@v1

      - name: Run tests
        run: sbt test

      - name: Build Scala.js
        run: sbt fastLinkJS

      - name: Assemble site
        run: |
          mkdir -p dist/assets
          cp target/scala-2.13/ui-template-sandbox-fastopt/*.js dist/assets/
          sed 's|./target/scala-2.13/ui-template-sandbox-fastopt/main.js|./assets/main.js|' index.html > dist/index.html

      - name: Deploy to Netlify
        uses: nwtgck/actions-netlify@v3
        with:
          publish-dir: ./dist
          production-deploy: true
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
