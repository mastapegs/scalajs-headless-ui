<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>UI Template</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #333;
    }

    #top-bar {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 56px;
      background: #2c3e50;
      color: white;
      display: flex;
      align-items: center;
      padding: 0 24px;
      font-size: 18px;
      font-weight: 600;
      z-index: 100;
    }

    #layout {
      display: flex;
      margin-top: 56px;
      height: calc(100vh - 56px);
    }

    #sidebar {
      width: 220px;
      flex-shrink: 0;
      background: #ecf0f1;
      padding: 24px 16px;
      border-right: 1px solid #bdc3c7;
    }

    #sidebar p {
      padding: 8px 12px;
      margin-bottom: 4px;
      border-radius: 4px;
      cursor: pointer;
    }

    #sidebar p:hover {
      background: #d5dbdb;
    }

    #main-content {
      flex: 1;
      padding: 32px;
      overflow-y: auto;
    }

    #main-content h1 {
      margin-bottom: 16px;
    }
  </style>
</head>
<body>
  <div id="appContainer"></div>
  <script type="module" src="./target/scala-2.13/ui-template-sandbox-fastopt/main.js"></script>
</body>
</html>
